services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: artifact-comparator-db
    environment:
      POSTGRES_DB: artifact_comparator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations
      - ./database/run-migrations.sh:/docker-entrypoint-initdb.d/02-run-migrations.sh
    networks:
      - artifact-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artifact-comparator-backend
    # env_file:
    #   - .env
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: artifact_comparator
      DB_USER: postgres
      DB_PASSWORD: password
      JWT_SECRET: your-super-secret-jwt-key-here
      JWT_EXPIRE: 7d
      EMAIL_USER: your_email@zohomail.eu
      EMAIL_PASSWORD: your_email_password_here
      EMAIL_FROM_NAME: RitHub
      FRONTEND_URL: http://localhost:3000
      # OpenAI config is read from backend/.env via volume mount
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./database:/database
    networks:
      - artifact-network

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: artifact-comparator-frontend
    environment:
      - REACT_APP_BACKEND_URL=http://backend:5000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - FAST_REFRESH=true
      - WDS_SOCKET_PORT=0
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/build
    networks:
      - artifact-network
    stdin_open: true
    tty: true

volumes:
  postgres_data:

networks:
  artifact-network:
    driver: bridge
